<!doctype html>
<html lang="sk">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tenis + Padel turnaj</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f7f2;
      --surface: #ffffff;
      --surface-2: #eef3ee;
      --ink: #17211c;
      --muted: #62706a;
      --line: #d8dfd9;
      --accent: #0f8f6f;
      --accent-dark: #08664f;
      --warn: #b75f18;
      --danger: #b3261e;
      --shadow: 0 10px 28px rgba(23, 33, 28, 0.1);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
    }

    button,
    input,
    select {
      font: inherit;
    }

    button {
      min-height: 44px;
      border: 0;
      border-radius: 8px;
      padding: 10px 14px;
      background: var(--ink);
      color: #fff;
      font-weight: 700;
      cursor: pointer;
    }

    button.secondary {
      background: var(--surface);
      color: var(--ink);
      border: 1px solid var(--line);
    }

    button.ghost {
      background: transparent;
      color: var(--ink);
      border: 1px solid transparent;
    }

    button.danger {
      background: var(--danger);
    }

    button.warning {
      background: var(--warn);
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.55;
    }

    input {
      width: 100%;
      min-height: 44px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px 12px;
      background: #fff;
      color: var(--ink);
    }

    .app-shell {
      min-height: 100vh;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      border-bottom: 1px solid var(--line);
      background: rgba(247, 247, 242, 0.96);
      backdrop-filter: blur(12px);
    }

    .topbar-inner {
      max-width: 1100px;
      margin: 0 auto;
      padding: 12px 14px;
      display: grid;
      gap: 10px;
    }

    .brand-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .brand {
      display: grid;
      gap: 2px;
    }

    .brand h1 {
      margin: 0;
      font-size: 1.05rem;
      line-height: 1.15;
    }

    .brand span,
    .saved {
      color: var(--muted);
      font-size: 0.82rem;
    }

    .phase-tabs {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 2px;
      scrollbar-width: none;
    }

    .phase-tabs::-webkit-scrollbar {
      display: none;
    }

    .phase-tab {
      flex: 0 0 auto;
      min-height: 38px;
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: var(--surface);
      color: var(--ink);
      font-weight: 700;
      white-space: nowrap;
    }

    .phase-tab.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 16px 14px 80px;
    }

    .grid {
      display: grid;
      gap: 14px;
    }

    .panel,
    .card {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .panel {
      padding: 14px;
    }

    .panel h2,
    .section-title h2 {
      margin: 0;
      font-size: 1rem;
      line-height: 1.25;
    }

    .section-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin: 4px 0 8px;
    }

    .muted {
      color: var(--muted);
    }

    .small {
      font-size: 0.86rem;
    }

    .setup-grid {
      display: grid;
      gap: 10px;
      margin-top: 12px;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 12px;
    }

    .leader-mini {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }

    .leader-chip {
      min-width: 0;
      border: 1px solid var(--line);
      background: var(--surface);
      border-radius: 8px;
      padding: 8px;
    }

    .leader-chip strong,
    .match-name,
    .player-name {
      display: block;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .leader-chip span {
      color: var(--muted);
      font-size: 0.78rem;
    }

    .score-table {
      width: 100%;
      border-collapse: collapse;
      overflow: hidden;
      border-radius: 8px;
      background: var(--surface);
      border: 1px solid var(--line);
    }

    .score-table th,
    .score-table td {
      padding: 9px 8px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      font-size: 0.9rem;
      vertical-align: middle;
    }

    .score-table th {
      color: var(--muted);
      font-size: 0.76rem;
      text-transform: uppercase;
    }

    .score-table tr:last-child td {
      border-bottom: 0;
    }

    .match-list {
      display: grid;
      gap: 10px;
    }

    .match-card {
      width: 100%;
      text-align: left;
      padding: 0;
      color: var(--ink);
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .match-card[disabled] {
      opacity: 0.78;
      background: var(--surface-2);
    }

    .match-body {
      padding: 12px;
      display: grid;
      gap: 10px;
    }

    .match-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      color: var(--muted);
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0;
    }

    .teams {
      display: grid;
      gap: 8px;
    }

    .team-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      align-items: center;
    }

    .team-row strong {
      font-size: 0.98rem;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 26px;
      border-radius: 999px;
      padding: 4px 8px;
      background: var(--surface-2);
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 800;
      white-space: nowrap;
    }

    .badge.good {
      background: #e1f4ec;
      color: var(--accent-dark);
    }

    .badge.warn {
      background: #fff1df;
      color: var(--warn);
    }

    .badge.danger {
      background: #fde8e5;
      color: var(--danger);
    }

    .match-card.deferred {
      border-color: #e5ad72;
      background: #fffaf3;
    }

    .two-col {
      display: grid;
      gap: 14px;
    }

    .group-grid {
      display: grid;
      gap: 14px;
    }

    .empty {
      padding: 16px;
      border: 1px dashed var(--line);
      border-radius: 8px;
      color: var(--muted);
      background: rgba(255, 255, 255, 0.52);
    }

    .rules-grid {
      display: grid;
      gap: 14px;
    }

    .rules-list {
      margin: 10px 0 0;
      padding-left: 20px;
      color: var(--ink);
    }

    .rules-list li {
      margin: 6px 0;
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      z-index: 30;
      display: none;
      align-items: flex-end;
      background: rgba(23, 33, 28, 0.48);
    }

    .modal-backdrop.open {
      display: flex;
    }

    .modal {
      width: 100%;
      max-height: 92vh;
      overflow: auto;
      background: var(--surface);
      border-radius: 12px 12px 0 0;
      padding: 16px;
      box-shadow: 0 -14px 38px rgba(0, 0, 0, 0.18);
    }

    .modal h2 {
      margin: 0 0 4px;
      font-size: 1.15rem;
    }

    .score-entry {
      display: grid;
      grid-template-columns: 1fr 92px;
      gap: 10px;
      align-items: center;
      margin-top: 12px;
    }

    .mode-row {
      display: grid;
      gap: 8px;
      margin-top: 12px;
    }

    .mode-block {
      display: none;
      margin-top: 12px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface-2);
    }

    .mode-block.active {
      display: block;
    }

    .score-entry label {
      min-width: 0;
      font-weight: 800;
    }

    .error {
      display: none;
      margin-top: 12px;
      color: var(--danger);
      font-weight: 700;
    }

    .error.show {
      display: block;
    }

    .footer-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 14px;
    }

    .footer-actions.three {
      grid-template-columns: 1fr 1fr 1fr;
    }

    .footer-actions.many {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .draw-overlay {
      position: fixed;
      inset: 0;
      z-index: 40;
      display: none;
      place-items: center;
      padding: 18px;
      background: rgba(23, 33, 28, 0.62);
    }

    .draw-overlay.open {
      display: grid;
    }

    .draw-panel {
      width: min(520px, 100%);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 18px;
      background: var(--surface);
      box-shadow: var(--shadow);
    }

    .draw-panel h2 {
      margin: 0 0 12px;
      font-size: 1.1rem;
    }

    .draw-list {
      display: grid;
      gap: 8px;
    }

    .draw-item {
      min-height: 42px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 9px 10px;
      background: var(--surface-2);
      font-weight: 800;
    }

    .draw-item span {
      color: var(--muted);
      font-size: 0.78rem;
      text-transform: uppercase;
    }

    @media (min-width: 720px) {
      .topbar-inner {
        grid-template-columns: minmax(240px, 1fr) minmax(360px, 2fr);
        align-items: center;
      }

      .phase-tabs {
        justify-content: flex-end;
      }

      .setup-grid {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }

      .two-col,
      .group-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .modal-backdrop {
        align-items: center;
        justify-content: center;
        padding: 20px;
      }

      .modal {
        max-width: 560px;
        border-radius: 12px;
      }

      .footer-actions.many {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="topbar-inner">
        <div class="brand-row">
          <div class="brand">
            <h1>Tenis + Padel turnaj</h1>
            <span id="phaseLabel">Príprava</span>
          </div>
          <span class="saved" id="saveStatus">offline</span>
        </div>
        <nav class="phase-tabs" id="tabs" aria-label="Fázy turnaja"></nav>
      </div>
    </header>

    <main id="app"></main>
  </div>

  <div class="modal-backdrop" id="scoreModal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal">
      <h2 id="modalTitle">Výsledok</h2>
      <p class="muted small" id="modalSubtitle"></p>
      <form id="scoreForm"></form>
    </div>
  </div>

  <div class="draw-overlay" id="drawOverlay" aria-live="polite" aria-hidden="true">
    <section class="draw-panel">
      <h2 id="drawTitle">Losovanie</h2>
      <div class="draw-list" id="drawList"></div>
    </section>
  </div>

  <script>
    (() => {
      const STORAGE_PREFIX = "tenis-padel-turnaj-v2";
      const LEGACY_STORAGE_PREFIX = "tenis-padel-turnaj-v1";
      const TOURNAMENT_INDEX_KEY = `${STORAGE_PREFIX}:index`;
      const SELECTED_TOURNAMENT_KEY = `${STORAGE_PREFIX}:selected`;
      const SUPABASE_URL = "https://xnceffkqjiuqxezqagag.supabase.co";
      const SUPABASE_ANON_KEY = "sb_publishable_CI2xiMwVBj8SCnfZ9u5U-Q_jXvuvyJC";
      const REMOTE_ENABLED = Boolean(SUPABASE_URL && SUPABASE_ANON_KEY);
      const PLACEMENT_POINTS = { 1: 12, 2: 10, 3: 8, 4: 7, 5: 5, 6: 4, 7: 2, 8: 1 };
      const TENNIS_POINTS = PLACEMENT_POINTS;
      const TABS = [
        ["join", "Turnaj"],
        ["setup", "Setup"],
        ["groups", "Skupiny"],
        ["playoff", "Playoff"],
        ["padel", "Padel"],
        ["rules", "Pravidlá"],
        ["leaderboard", "Tabuľka"]
      ];

      const app = document.getElementById("app");
      const tabsEl = document.getElementById("tabs");
      const phaseLabel = document.getElementById("phaseLabel");
      const saveStatus = document.getElementById("saveStatus");
      const modal = document.getElementById("scoreModal");
      const modalTitle = document.getElementById("modalTitle");
      const modalSubtitle = document.getElementById("modalSubtitle");
      const scoreForm = document.getElementById("scoreForm");
      const drawOverlay = document.getElementById("drawOverlay");
      const drawTitle = document.getElementById("drawTitle");
      const drawList = document.getElementById("drawList");

      clearLegacyTournamentHistory();

      let tournamentId = getInitialTournamentId();
      let state = loadState();
      let activeTab = getInitialTab() || (tournamentId ? state.setupDone ? "groups" : "setup" : "join");
      let syncTimer = null;

      function getInitialTournamentId() {
        const params = new URLSearchParams(window.location.search);
        const fromUrl = normalizeTournamentId(params.get("turnaj"));
        if (fromUrl) {
          return fromUrl;
        }
        return null;
      }

      function getInitialTab() {
        const params = new URLSearchParams(window.location.search);
        return params.get("tab") === "rules" ? "rules" : null;
      }

      function clearLegacyTournamentHistory() {
        const legacyKeys = [];
        for (let i = 0; i < localStorage.length; i += 1) {
          const key = localStorage.key(i);
          if (key === LEGACY_STORAGE_PREFIX || key?.startsWith(`${LEGACY_STORAGE_PREFIX}:`)) {
            legacyKeys.push(key);
          }
        }
        legacyKeys.forEach((key) => localStorage.removeItem(key));
      }

      function normalizeTournamentId(value) {
        const cleaned = String(value || "")
          .trim()
          .toLowerCase()
          .replace(/\s+/g, "-")
          .replace(/[^a-z0-9-]/g, "")
          .replace(/-+/g, "-")
          .replace(/^-|-$/g, "");
        return cleaned.slice(0, 48);
      }

      function currentStorageKey() {
        return `${STORAGE_PREFIX}:${tournamentId || "none"}`;
      }

      function emptyState() {
        const now = new Date().toISOString();
        return {
          version: 1,
          tournamentId,
          setupDone: false,
          players: [],
          groups: { A: [], B: [] },
          tennisMatches: [],
          padelMatches: [],
          padelTargetRounds: 13,
          auditLog: [],
          undoStack: [],
          createdAt: now,
          updatedAt: now
        };
      }

      function loadState() {
        if (!tournamentId) return emptyState();
        try {
          const raw = localStorage.getItem(currentStorageKey());
          if (!raw) return emptyState();
          const parsed = JSON.parse(raw);
          return normalizeState(parsed);
        } catch {
          return emptyState();
        }
      }

      function normalizeState(value) {
        const base = emptyState();
        return {
          ...base,
          ...value,
          tournamentId,
          groups: { ...base.groups, ...(value.groups || {}) },
          tennisMatches: normalizeMatches(value.tennisMatches || []),
          padelMatches: normalizeMatches(value.padelMatches || []),
          auditLog: Array.isArray(value.auditLog) ? value.auditLog : [],
          undoStack: Array.isArray(value.undoStack) ? value.undoStack : [],
          padelTargetRounds: value.padelTargetRounds || 13,
          updatedAt: value.updatedAt || value.createdAt || base.updatedAt
        };
      }

      function normalizeMatches(matches) {
        return Array.isArray(matches) ? matches.map((match) => ({
          ...match,
          status: match.status === "deferred" && !match.result ? "deferred" : "scheduled"
        })) : [];
      }

      function snapshotCoreState(source = state) {
        const copy = JSON.parse(JSON.stringify(source));
        delete copy.auditLog;
        delete copy.undoStack;
        return copy;
      }

      function recordAudit(before, action, details = {}) {
        const entry = {
          id: `audit-${Date.now()}-${Math.random().toString(36).slice(2, 8)}`,
          at: new Date().toISOString(),
          action,
          ...details
        };
        state.undoStack = [
          ...(state.undoStack || []),
          { id: entry.id, at: entry.at, action, before }
        ].slice(-20);
        state.auditLog = [
          ...(state.auditLog || []),
          entry
        ].slice(-100);
      }

      function restoreFromUndo() {
        const stack = state.undoStack || [];
        const last = stack[stack.length - 1];
        if (!last) {
          window.alert("Nie je čo vrátiť späť.");
          return;
        }
        if (!window.confirm(`Vrátiť späť poslednú zmenu: ${last.action}?`)) return;
        const currentAudit = state.auditLog || [];
        const remainingUndo = stack.slice(0, -1);
        state = normalizeState(last.before);
        state.auditLog = [
          ...currentAudit,
          {
            id: `audit-${Date.now()}-${Math.random().toString(36).slice(2, 8)}`,
            at: new Date().toISOString(),
            action: "Späť poslednú zmenu",
            revertedAction: last.action
          }
        ].slice(-100);
        state.undoStack = remainingUndo;
        saveState();
        render();
      }

      function saveState(options = {}) {
        if (!tournamentId) return;
        state.tournamentId = tournamentId;
        if (options.touch !== false) state.updatedAt = new Date().toISOString();
        localStorage.setItem(currentStorageKey(), JSON.stringify(state));
        localStorage.setItem(SELECTED_TOURNAMENT_KEY, tournamentId);
        rememberTournament(state);
        setSyncStatus(REMOTE_ENABLED ? "uložené lokálne" : "uložené lokálne");
        if (options.remote !== false) queueRemoteSave();
      }

      function rememberTournament(source = state) {
        if (!tournamentId) return;
        const players = Array.isArray(source.players) ? source.players.map((player) => player.name).filter(Boolean) : [];
        const entry = {
          id: tournamentId,
          setupDone: Boolean(source.setupDone),
          players,
          updatedAt: source.updatedAt || new Date().toISOString()
        };
        const index = getTournamentIndex().filter((item) => item.id !== tournamentId);
        index.unshift(entry);
        localStorage.setItem(TOURNAMENT_INDEX_KEY, JSON.stringify(index.slice(0, 30)));
      }

      function getTournamentIndex() {
        try {
          const parsed = JSON.parse(localStorage.getItem(TOURNAMENT_INDEX_KEY) || "[]");
          return Array.isArray(parsed) ? parsed.filter((item) => normalizeTournamentId(item.id)) : [];
        } catch {
          return [];
        }
      }

      function setSyncStatus(text) {
        saveStatus.textContent = text;
      }

      function queueRemoteSave() {
        if (!REMOTE_ENABLED) {
          window.clearTimeout(syncTimer);
          syncTimer = window.setTimeout(() => setSyncStatus("offline"), 900);
          return;
        }
        window.clearTimeout(syncTimer);
        syncTimer = window.setTimeout(() => {
          pushRemoteState().catch(() => setSyncStatus("chyba syncu"));
        }, 250);
      }

      async function pushRemoteState() {
        if (!REMOTE_ENABLED || !tournamentId) return;
        setSyncStatus("ukladám online");
        const response = await fetch(`${supabaseRestUrl()}?on_conflict=id`, {
          method: "POST",
          headers: supabaseHeaders({ prefer: "resolution=merge-duplicates,return=minimal" }),
          body: JSON.stringify({
            id: tournamentId,
            state,
            updated_at: state.updatedAt
          })
        });
        if (!response.ok) throw new Error(`Supabase save failed: ${response.status}`);
        setSyncStatus("uložené online");
      }

      async function loadRemoteState() {
        if (!tournamentId) {
          setSyncStatus("vyber turnaj");
          return;
        }
        if (!REMOTE_ENABLED) {
          setSyncStatus("offline");
          return;
        }
        setSyncStatus("načítavam online");
        try {
          const response = await fetch(`${supabaseRestUrl()}?id=eq.${encodeURIComponent(tournamentId)}&select=id,state,updated_at`, {
            headers: supabaseHeaders()
          });
          if (!response.ok) throw new Error(`Supabase load failed: ${response.status}`);
          const rows = await response.json();
          const remote = rows[0]?.state ? normalizeState(rows[0].state) : null;
          if (!remote) {
            if (state.setupDone) await pushRemoteState();
            else setSyncStatus("online pripravené");
            return;
          }
          if (remote.setupDone && !state.setupDone) {
            state = remote;
            saveState({ touch: false, remote: false });
            activeTab = "groups";
            setSyncStatus("načítané online");
            render();
            return;
          }
          const remoteTime = Date.parse(remote.updatedAt || rows[0].updated_at || 0);
          const localTime = Date.parse(state.updatedAt || 0);
          if (remoteTime > localTime) {
            state = remote;
            saveState({ touch: false, remote: false });
            activeTab = state.setupDone && activeTab === "setup" ? "groups" : activeTab;
            setSyncStatus("načítané online");
            render();
            return;
          }
          if (localTime > remoteTime && state.setupDone) {
            const keepLocal = window.confirm("V tomto prehliadači sú novšie dáta než online verzia. Odoslať lokálne dáta online?");
            if (keepLocal) await pushRemoteState();
            else {
              state = remote;
              saveState({ touch: false, remote: false });
              setSyncStatus("načítané online");
              render();
            }
            return;
          }
          setSyncStatus("online aktuálne");
        } catch (error) {
          console.error(error);
          setSyncStatus("chyba syncu");
        }
      }

      function supabaseRestUrl() {
        return `${SUPABASE_URL.replace(/\/$/, "")}/rest/v1/tournaments`;
      }

      function supabaseHeaders(options = {}) {
        const headers = {
          apikey: SUPABASE_ANON_KEY,
          Authorization: `Bearer ${SUPABASE_ANON_KEY}`,
          "Content-Type": "application/json"
        };
        if (options.prefer) headers.Prefer = options.prefer;
        return headers;
      }

      function render() {
        ensurePlayoff();
        ensurePadelNextRound();
        renderTabs();
        phaseLabel.textContent = getPhaseLabel();
        if (!tournamentId) {
          if (activeTab === "rules") renderRules();
          else {
            activeTab = "join";
            renderJoin();
          }
          return;
        }
        if (activeTab === "join") renderJoin();
        if (!state.setupDone && !["rules", "join"].includes(activeTab)) {
          activeTab = "setup";
          renderSetup();
          return;
        }
        if (activeTab === "setup") activeTab = "groups";
        if (activeTab === "groups") renderGroups();
        if (activeTab === "playoff") renderPlayoff();
        if (activeTab === "padel") renderPadel();
        if (activeTab === "rules") renderRules();
        if (activeTab === "leaderboard") renderLeaderboardPage();
      }

      function renderTabs() {
        tabsEl.innerHTML = "";
        TABS.forEach(([id, label]) => {
          if (id === "join") {
            label = "Domov";
          }
          if (!tournamentId && !["join", "rules"].includes(id)) return;
          if (!state.setupDone && !["join", "setup", "rules"].includes(id)) return;
          if (state.setupDone && id === "setup") return;
          const button = document.createElement("button");
          button.className = `phase-tab${activeTab === id ? " active" : ""}`;
          button.type = "button";
          button.textContent = label;
          button.addEventListener("click", () => {
            if (id === "join") {
              goHome();
              return;
            }
            activeTab = id;
            updateTabUrl(id);
            render();
          });
          tabsEl.appendChild(button);
        });
      }

      function getPhaseLabel() {
        if (activeTab === "rules") return "Pravidlá";
        if (!tournamentId) return "Vyber turnaja";
        if (!state.setupDone) return "Príprava hráčov";
        if (!allGroupMatchesComplete()) return "Tenis - skupiny";
        if (!allPlayoffComplete()) return "Tenis - playoff";
        if (state.padelMatches.filter((m) => m.result).length < state.padelTargetRounds) return "Padel Americano";
        return "Celkové výsledky";
      }

      function renderTournamentCard(item) {
        const players = item.players?.length ? item.players.join(", ") : "hráči ešte nie sú zadaní";

            <div class="actions">

            </div>
          </div>
        `;
      }

      function switchTournament(nextId) {
        tournamentId = nextId;
        localStorage.setItem(SELECTED_TOURNAMENT_KEY, tournamentId);
        updateTournamentUrl();
        state = loadState();
        rememberTournament(state);
        activeTab = state.setupDone ? "groups" : "setup";
        render();
        loadRemoteState();
      }

      function goHome() {
        tournamentId = null;
        localStorage.removeItem(SELECTED_TOURNAMENT_KEY);
        state = emptyState();
        activeTab = "join";
        const url = new URL(window.location.href);
        url.searchParams.delete("turnaj");
        url.searchParams.delete("tab");
        window.history.replaceState({}, "", url);
        render();
      }

      function updateTabUrl(tab) {
        const url = new URL(window.location.href);
        if (tab === "rules") url.searchParams.set("tab", "rules");
        else url.searchParams.delete("tab");
        window.history.replaceState({}, "", url);
      }

      function updateTournamentUrl() {
        const url = new URL(window.location.href);
        url.searchParams.set("turnaj", tournamentId);
        url.searchParams.delete("tab");
        window.history.replaceState({}, "", url);
      }

      function getTournamentUrl(id) {
        const url = new URL(window.location.href);
        url.searchParams.set("turnaj", id);
        url.searchParams.delete("tab");
        return url.toString();

      function getRulesUrl() {
        const url = new URL(window.location.href);
        url.searchParams.delete("turnaj");

        app.innerHTML = `

        document.getElementById("setupForm").addEventListener("submit", async (event) => {
          event.preventDefault();
          const form = new FormData(event.currentTarget);
          const names = Array.from({ length: 8 }, (_, i) => String(form.get(`player${i}`)).trim());
          const unique = new Set(names.map((name) => name.toLocaleLowerCase("sk")));
          if (names.some((name) => !name) || unique.size !== 8) {
            window.alert("Zadaj 8 neprázdnych a rozdielnych mien.");
            return;
          }
          await startTournament(names);

      async function startTournament(names) {
        const before = snapshotCoreState();
        const players = shuffle(names).map((name, index) => ({
          id: `p${index + 1}`,
          name,
          drawIndex: index
        }));
        const groupA = players.slice(0, 4).map((p) => p.id);
        const groupB = players.slice(4, 8).map((p) => p.id);
        await runDrawAnimation("Rozlosovanie turnaja", [
          { label: "Skupina A", value: groupA.map((id) => players.find((p) => p.id === id).name).join(", ") },
          { label: "Skupina B", value: groupB.map((id) => players.find((p) => p.id === id).name).join(", ") }
        ], names);
        state = {
          ...emptyState(),
          setupDone: true,
          players,
          groups: { A: groupA, B: groupB },
          tennisMatches: createGroupMatches(groupA, groupB)
        };
        state.padelMatches = [createPadelRound(1)];
        recordAudit(before, "Štart turnaja", {
          oldValue: { setupDone: false },
          newValue: { setupDone: true, players: players.map((p) => p.name) }
        });
        activeTab = "groups";
        saveState();
        render();
      }

      function isDeferredMatch(match) {
        return !match.result && match.status === "deferred";

      function isPendingMatch(match) {
        return !match.result && match.status !== "deferred";

      function renderMatchSection(title, matches, emptyText) {

        const hidden = matches.length - visible.length;
        return `
          <section>
            <div class="section-title">

              <div class="match-meta">

                  <span>${score ? score.right : ""}</span>
                </div>
              </div>
            </div>
          </button>
        `;

      function bindMatchButtons() {

      function bindPadelButtons() {
        const reroll = document.getElementById("rerollPadelRound");

      }

      async function rerollCurrentPadelRound() {
        const current = state.padelMatches.find(isPendingMatch);
        if (!current) return;
        const unavailable = window.prompt("Ak niekto nemôže nastúpiť, napíš meno alebo viac mien oddelených čiarkou. Ak nikto nechýba, nechaj prázdne.");
        if (unavailable === null) return;
        const blockedIds = parseUnavailablePlayers(unavailable);
        if (!blockedIds) return;
        if (state.players.filter((player) => !blockedIds.has(player.id)).length < 4) {
          window.alert("Na padel kolo musia ostať aspoň 4 dostupní hráči.");
          return;
        }
        if (!(await confirmRemoteFreshness())) return;
        const replacement = createPadelRound(current.round, { blockedIds, currentMatch: current });
        if (!window.confirm(`Prelosovať aktuálne kolo na ${teamName(replacement.side1.players)} vs ${teamName(replacement.side2.players)}?`)) return;
        const before = snapshotCoreState();
        await runDrawAnimation(`Prelosovanie padel kola ${current.round}`, formatPadelDrawItems(replacement));
        const index = state.padelMatches.findIndex((match) => match.id === current.id);
        state.padelMatches[index] = replacement;
        recordAudit(before, "Prelosovanie padel kola", {
          matchId: replacement.id,
          matchLabel: replacement.label,
          oldValue: {
            side1: current.side1,
            side2: current.side2
          },
          newValue: {
            side1: replacement.side1,
            side2: replacement.side2,
            blockedIds: [...blockedIds]
          }
        });
        saveState();
        render();
      }

      function parseUnavailablePlayers(value) {
        const names = String(value || "")
          .split(",")
          .map((name) => name.trim())
          .filter(Boolean);
        const blocked = new Set();
        for (const name of names) {
          const normalized = name.toLocaleLowerCase("sk");
          const matches = state.players.filter((player) => player.name.toLocaleLowerCase("sk").includes(normalized));
          if (matches.length !== 1) {
            window.alert(`Neviem jednoznačne nájsť hráča "${name}". Použi presné meno z turnaja.`);
            return null;
          }
          blocked.add(matches[0].id);
        }
        return blocked;
      }

      function openScoreModal(match) {
        const resolved = resolveMatchPlayers(match);
        const existing = match.result || {};
        modalTitle.textContent = match.phase === "padel" ? `Padel - kolo ${match.round}` : match.label;
        modalSubtitle.textContent = `${teamName(resolved[0])} vs ${teamName(resolved[1])}`;
        scoreForm.innerHTML = buildScoreForm(match, resolved, existing);
        bindResultModeControls();
        modal.classList.add("open");
        scoreForm.querySelector("[name='resultMode']")?.focus();
        scoreForm.onsubmit = async (event) => {
          event.preventDefault();
          const result = readAndValidateResult(match, new FormData(scoreForm));
          const error = scoreForm.querySelector(".error");
          if (!result.ok) {
            error.textContent = result.message;
            error.classList.add("show");
            return;
          }
          const message = `Uložiť výsledok ${teamName(resolved[0])} ${result.result.scoreLabel} ${teamName(resolved[1])}?`;
          if (!window.confirm(message)) return;
          if (!(await confirmRemoteFreshness())) return;
          const before = snapshotCoreState();
          const previousResult = match.result ? JSON.parse(JSON.stringify(match.result)) : null;
          if (!prepareForResultChange(match)) return;
          match.status = "scheduled";
          match.result = {
            ...result.result,
            savedAt: new Date().toISOString()
          };
          recordAudit(before, previousResult ? "Oprava výsledku" : "Uloženie výsledku", {
            matchId: match.id,
            matchLabel: match.label,
            oldValue: previousResult,
            newValue: match.result
          });
          closeModal();
          if (match.phase === "padel") {
            await appendNextPadelRoundWithAnimation();
          }
          saveState();
          render();
        };
        const cancel = scoreForm.querySelector("[data-cancel]");
        cancel.addEventListener("click", closeModal);
        const clear = scoreForm.querySelector("[data-clear]");
        if (clear) {
          clear.addEventListener("click", async () => {
            if (!window.confirm("Vymazať uložený výsledok tohto zápasu?")) return;
            if (!(await confirmRemoteFreshness())) return;
            const before = snapshotCoreState();
            const previousResult = match.result ? JSON.parse(JSON.stringify(match.result)) : null;
            if (!prepareForResultChange(match)) return;
            delete match.result;
            match.status = "scheduled";
            recordAudit(before, "Vymazanie výsledku", {
              matchId: match.id,
              matchLabel: match.label,
              oldValue: previousResult,
              newValue: null
            });
            saveState();
            closeModal();
            render();
          });
        }
        const defer = scoreForm.querySelector("[data-defer]");
        if (defer) {
          defer.addEventListener("click", async () => {
            if (!window.confirm("Odložiť tento zápas bez započítania bodov? Výsledok môžeš dopísať neskôr.")) return;
            if (!(await confirmRemoteFreshness())) return;
            const before = snapshotCoreState();
            match.status = "deferred";
            recordAudit(before, "Odloženie zápasu", {
              matchId: match.id,
              matchLabel: match.label,
              newValue: { status: match.status }
            });
            closeModal();
            if (match.phase === "padel") {
              await appendNextPadelRoundWithAnimation();
            }
            saveState();
            render();
          });
        }
        const closeAsDraw = scoreForm.querySelector("[data-close-draw]");
        if (closeAsDraw) {
          closeAsDraw.addEventListener("click", async () => {
            if (!window.confirm("Uzavrieť odložený zápas ako remízu 8:8?")) return;
            if (!(await confirmRemoteFreshness())) return;
            const before = snapshotCoreState();
            if (!prepareForResultChange(match)) return;
            match.status = "scheduled";
            match.result = drawResult();
            recordAudit(before, "Uzavretie odloženého zápasu remízou", {
              matchId: match.id,
              matchLabel: match.label,
              newValue: match.result
            });
            closeModal();
            if (match.phase === "padel") {
              await appendNextPadelRoundWithAnimation();
            }
            saveState();
            render();
          });
        }
      }

      function buildScoreForm(match, resolved, existing) {
        const mode = existing.mode || "normal";
        const drawAllowed = canDraw(match);
        const modeControls = `
          <div class="mode-row">
            <label for="resultMode"><strong>Typ výsledku</strong></label>
            <select id="resultMode" name="resultMode">
              <option value="normal" ${mode === "normal" ? "selected" : ""}>Normálny výsledok</option>
              <option value="forfeit" ${mode === "forfeit" ? "selected" : ""}>Kontumácia</option>
              ${drawAllowed ? `<option value="draw" ${mode === "draw" ? "selected" : ""}>Remíza / nedohrané</option>` : ""}
            </select>
          </div>
        `;
        const forfeitBlock = `
          <div class="mode-block" data-mode-block="forfeit">
            <p class="muted small">Kontumácia uloží default skóre podľa formátu zápasu.</p>
            <div class="score-entry">
              <label>Víťaz kontumáciou</label>
              <select name="forfeitWinner">
                <option value="0" ${existing.winnerSide === 0 ? "selected" : ""}>${escapeHtml(teamName(resolved[0]))}</option>
                <option value="1" ${existing.winnerSide === 1 ? "selected" : ""}>${escapeHtml(teamName(resolved[1]))}</option>
              </select>
            </div>
          </div>
        `;
        const drawBlock = drawAllowed ? `
          <div class="mode-block" data-mode-block="draw">
            <p class="muted small">Remíza / nedohrané sa uloží ako 8:8. Nepočíta sa žiadna výhra ani prehra.</p>
          </div>
        ` : "";
        if (match.format === "set4") {
          return `
            ${modeControls}
            <div class="mode-block" data-mode-block="normal">
              <div class="score-entry">
                <label>${escapeHtml(teamName(resolved[0]))} - gemy</label>
                <input inputmode="numeric" pattern="[0-9]*" name="games1" value="${existing.games1 ?? ""}">
              </div>
              <div class="score-entry">
                <label>${escapeHtml(teamName(resolved[1]))} - gemy</label>
                <input inputmode="numeric" pattern="[0-9]*" name="games2" value="${existing.games2 ?? ""}">
              </div>
              <div class="score-entry">
                <label>Tiebreak hráč 1</label>
                <input inputmode="numeric" pattern="[0-9]*" name="tb1" value="${existing.tb1 ?? ""}" placeholder="iba pri 4:4">
              </div>
              <div class="score-entry">
                <label>Tiebreak hráč 2</label>
                <input inputmode="numeric" pattern="[0-9]*" name="tb2" value="${existing.tb2 ?? ""}" placeholder="iba pri 4:4">
              </div>
            </div>
            ${forfeitBlock}
            <p class="error"></p>
            ${modalActions(match)}
          `;
        }
        return `
          ${modeControls}
          <div class="mode-block" data-mode-block="normal">
            <div class="score-entry">
              <label>${escapeHtml(teamName(resolved[0]))}</label>
              <input inputmode="numeric" pattern="[0-9]*" name="score1" value="${existing.score1 ?? ""}">
            </div>
            <div class="score-entry">
              <label>${escapeHtml(teamName(resolved[1]))}</label>
              <input inputmode="numeric" pattern="[0-9]*" name="score2" value="${existing.score2 ?? ""}">
            </div>
          </div>
          ${forfeitBlock}

      function bindResultModeControls() {
        const select = scoreForm.querySelector("[name='resultMode']");
        if (!select) return;
        const update = () => {
          scoreForm.querySelectorAll("[data-mode-block]").forEach((block) => {
            block.classList.toggle("active", block.dataset.modeBlock === select.value);
          });
        };
        select.addEventListener("change", update);

      function modalActions(match) {
        const hasResult = Boolean(match.result);
        const canDefer = !hasResult && !isDeferredMatch(match);
        const canCloseDraw = !hasResult && isDeferredMatch(match) && canDraw(match);
        const actionCount = 2 + Number(hasResult) + Number(canDefer) + Number(canCloseDraw);
        const className = actionCount > 3 ? "many" : actionCount === 3 ? "three" : "";
        return `
          <div class="footer-actions ${className}">
            <button type="button" class="secondary" data-cancel>Zrušiť</button>
            ${hasResult ? `<button type="button" class="danger" data-clear>Vymazať</button>` : ""}
            ${canDefer ? `<button type="button" class="warning" data-defer>Odložiť</button>` : ""}
            ${canCloseDraw ? `<button type="button" class="secondary" data-close-draw>Remíza 8:8</button>` : ""}
            <button type="submit">Uložiť</button>
          </div>
        `;
      }

      function drawResult() {
        return {
          mode: "draw",
          isDraw: true,
          score1: 8,
          score2: 8,
          scoreLabel: "8:8 remíza",
          savedAt: new Date().toISOString()
        };
      }

      function readAndValidateResult(match, form) {
        const mode = form.get("resultMode") || "normal";
        if (mode === "forfeit") {
          const winnerSide = toInt(form.get("forfeitWinner"));
          if (![0, 1].includes(winnerSide)) return { ok: false, message: "Vyber víťaza kontumáciou." };
          if (match.format === "set4") {
            const games1 = winnerSide === 0 ? 4 : 0;
            const games2 = winnerSide === 1 ? 4 : 0;
            return {
              ok: true,
              result: {
                mode,
                games1,
                games2,
                winnerSide,
                scoreLabel: `${games1}:${games2} kont.`
              }
            };
          }
          const score1 = winnerSide === 0 ? 16 : 0;
          const score2 = winnerSide === 1 ? 16 : 0;
          return {
            ok: true,
            result: {
              mode,
              score1,
              score2,
              winnerSide,
              scoreLabel: `${score1}:${score2} kont.`
            }
          };
        }
        if (mode === "draw") {
          if (!canDraw(match)) return { ok: false, message: "Remíza je povolená iba v skupinách a padeli." };
          return {
            ok: true,
            result: {
              mode,
              isDraw: true,
              score1: 8,
              score2: 8,
              scoreLabel: "8:8 remíza"
            }
          };
        }
        if (match.format === "tb16") {
          const score1 = toInt(form.get("score1"));
          const score2 = toInt(form.get("score2"));
          const valid = validateTiebreak(score1, score2, 16);
          if (!valid.ok) return valid;
          return {
            ok: true,
            result: {
              mode: "normal",
              score1,
              score2,
              winnerSide: score1 > score2 ? 0 : 1,
              scoreLabel: `${score1}:${score2}`
            }
          };
        }
        const games1 = toInt(form.get("games1"));
        const games2 = toInt(form.get("games2"));
        if (!Number.isInteger(games1) || !Number.isInteger(games2) || games1 < 0 || games2 < 0) {
          return { ok: false, message: "Zadaj platné gemy." };
        }
        if (games1 === 4 && games2 <= 3) {
          return { ok: true, result: { mode: "normal", games1, games2, winnerSide: 0, scoreLabel: `${games1}:${games2}` } };
        }
        if (games2 === 4 && games1 <= 3) {
          return { ok: true, result: { mode: "normal", games1, games2, winnerSide: 1, scoreLabel: `${games1}:${games2}` } };
        }
        if (games1 === 4 && games2 === 4) {
          const tb1 = toInt(form.get("tb1"));
          const tb2 = toInt(form.get("tb2"));
          const valid = validateTiebreak(tb1, tb2, 7);
          if (!valid.ok) return { ok: false, message: `Pri 4:4: ${valid.message}` };
          return {
            ok: true,
            result: {
              mode: "normal",
              games1,
              games2,
              tb1,
              tb2,
              winnerSide: tb1 > tb2 ? 0 : 1,
              scoreLabel: `${games1}:${games2} (${tb1}:${tb2})`
            }
          };
        }
        return { ok: false, message: "Set musí skončiť 4:0, 4:1, 4:2, 4:3 alebo 4:4 s tiebreakom." };
      }

      function canDraw(match) {
        return match.phase === "group" || match.phase === "padel";
      }

      function validateTiebreak(score1, score2, target) {
        if (!Number.isInteger(score1) || !Number.isInteger(score2) || score1 < 0 || score2 < 0) {
          return { ok: false, message: "Zadaj platné nezáporné body." };
        }
        if (score1 === score2) return { ok: false, message: "Remíza nie je platný výsledok." };
        const winner = Math.max(score1, score2);
        const loser = Math.min(score1, score2);
        if (winner < target) return { ok: false, message: `Víťaz musí mať aspoň ${target} bodov.` };
        if (loser <= target - 2 && winner !== target) {
          return { ok: false, message: `Pri skóre pod zhodou musí zápas skončiť presne na ${target}.` };
        }
        if (loser >= target - 1 && winner !== loser + 2) {
          return { ok: false, message: "Po zhode musí byť rozdiel presne 2 body." };
        }
        return { ok: true };
      }

      function prepareForResultChange(match) {
        if (match.phase === "group" && state.tennisMatches.some((m) => m.phase === "playoff")) {
          const hasPlayoffResults = state.tennisMatches.some((m) => m.phase === "playoff" && m.result);
          const text = hasPlayoffResults
            ? "Zmena skupinového zápasu vymaže celý playoff pavúk aj jeho výsledky. Pokračovať?"
            : "Zmena skupinového zápasu prelosuje playoff pavúk. Pokračovať?";
          if (!window.confirm(text)) return false;
          state.tennisMatches = state.tennisMatches.filter((m) => m.phase === "group");
          return true;
        }
        if (match.phase === "playoff") {
          const dependents = getDependentPlayoffIds(match.id);
          const dependentMatches = state.tennisMatches.filter((m) => dependents.has(m.id) && m.result);
          if (dependentMatches.length) {
            if (!window.confirm("Zmena tohto zápasu vymaže nadväzujúce playoff výsledky. Pokračovať?")) return false;
            dependentMatches.forEach((dependent) => {
              delete dependent.result;
            });
          }
        }
        return true;
      }

      function getDependentPlayoffIds(matchId) {
        const found = new Set();
        let changed = true;
        while (changed) {
          changed = false;
          state.tennisMatches.filter((m) => m.phase === "playoff").forEach((match) => {
            const sides = [match.side1, match.side2];
            const depends = sides.some((side) => side.ref && (side.ref.matchId === matchId || found.has(side.ref.matchId)));
            if (depends && !found.has(match.id)) {
              found.add(match.id);
              changed = true;
            }
          });
        }
        return found;
      }

      function closeModal() {
        modal.classList.remove("open");
        scoreForm.innerHTML = "";
      }

      modal.addEventListener("click", (event) => {
        if (event.target === modal) closeModal();
      });

      document.addEventListener("keydown", (event) => {
        if (event.key === "Escape" && modal.classList.contains("open")) closeModal();
      });

      function createGroupMatches(groupA, groupB) {
        return [
          ...roundRobin(groupA, "A"),
          ...roundRobin(groupB, "B")
        ];
      }

      function roundRobin(ids, group) {
        const pairs = [[0, 1], [2, 3], [0, 2], [1, 3], [0, 3], [1, 2]];
        return pairs.map(([a, b], index) => ({
          id: `g-${group}-${index + 1}`,
          phase: "group",
          group,
          label: `Skupina ${group} - zápas ${index + 1}`,
          format: "tb16",
          side1: { players: [ids[a]] },
          side2: { players: [ids[b]] }
        }));
      }

      function ensurePlayoff() {
        if (!state.setupDone || !allGroupMatchesComplete()) return;
        if (state.tennisMatches.some((m) => m.phase === "playoff")) return;
        const a = getGroupStandings("A").map((row) => row.id);
        const b = getGroupStandings("B").map((row) => row.id);
        state.tennisMatches.push(
          playoffMatch("qf1", "Top QF1", "set4", [a[0]], [b[1]]),
          playoffMatch("qf2", "Top QF2", "set4", [b[0]], [a[1]]),
          playoffMatch("qf3", "Bottom QF3", "set4", [a[2]], [b[3]]),
          playoffMatch("qf4", "Bottom QF4", "set4", [b[2]], [a[3]]),
          playoffMatch("final1", "Finále o 1. miesto", "set4", ref("qf1", "winner"), ref("qf2", "winner")),
          playoffMatch("third", "Zápas o 3. miesto", "set4", ref("qf1", "loser"), ref("qf2", "loser")),
          playoffMatch("fifth", "Zápas o 5. miesto", "set4", ref("qf3", "winner"), ref("qf4", "winner")),
          playoffMatch("seventh", "Zápas o 7. miesto", "set4", ref("qf3", "loser"), ref("qf4", "loser"))
        );
        saveState();
      }

      function playoffMatch(id, label, format, side1, side2) {
        return {
          id,
          phase: "playoff",
          label,
          format,
          side1: Array.isArray(side1) ? { players: side1 } : side1,
          side2: Array.isArray(side2) ? { players: side2 } : side2
        };
      }

      function ref(matchId, outcome) {
        return { ref: { matchId, outcome } };
      }

      function ensurePadelNextRound() {
        if (!state.setupDone) return;
        if (state.padelMatches.length >= state.padelTargetRounds) return;
        if (state.padelMatches.some(isPendingMatch)) return;
        state.padelMatches.push(createPadelRound(state.padelMatches.length + 1));
        saveState();
      }

      async function appendNextPadelRoundWithAnimation() {
        if (!state.setupDone) return false;
        if (state.padelMatches.length >= state.padelTargetRounds) return false;
        if (state.padelMatches.some(isPendingMatch)) return false;
        const before = snapshotCoreState();
        const next = createPadelRound(state.padelMatches.length + 1);
        await runDrawAnimation(`Padel - kolo ${next.round}`, formatPadelDrawItems(next));
        state.padelMatches.push(next);
        recordAudit(before, "Losovanie padel kola", {
          matchId: next.id,
          matchLabel: next.label,
          newValue: {
            side1: next.side1,
            side2: next.side2
          }
        });
        return true;
      }

      function createPadelRound(round, options = {}) {
        const blockedIds = new Set(options.blockedIds || []);
        const stats = getPadelStatsForSelection().filter((row) => !blockedIds.has(row.id));
        const active = selectPadelPlayers(stats, options)
          .sort((a, b) => b.points - a.points || a.games - b.games || a.drawIndex - b.drawIndex);
        const pairings = [
          [[active[0].id, active[3].id], [active[1].id, active[2].id]],
          [[active[0].id, active[2].id], [active[1].id, active[3].id]],
          [[active[0].id, active[1].id], [active[2].id, active[3].id]]
        ];
        const partnerHistory = getPadelPartnerHistory();
        const opponentHistory = getPadelOpponentHistory();
        const best = pairings
          .map((pairs, index) => ({
            pairs,
            index,
            score: pairingRepeatScore(pairs, partnerHistory, opponentHistory, options.currentMatch)
          }))
          .sort((a, b) => a.score - b.score || a.index - b.index)[0].pairs;
        return {
          id: `padel-${round}`,
          phase: "padel",
          label: `Padel - kolo ${round}`,
          round,
          format: "tb16",
          side1: { players: best[0] },
          side2: { players: best[1] }
        };
      }

      function selectPadelPlayers(stats, options = {}) {
        if (stats.length < 4) return stats;
        const currentKey = options.currentMatch ? quartetKey(resolveMatchPlayers(options.currentMatch).flat()) : null;
        return combinations(stats, 4)
          .map((players) => {
            const games = players.map((row) => row.games);
            const points = players.reduce((sum, row) => sum + row.points, 0);
            const lastRounds = players.reduce((sum, row) => sum + row.lastRound, 0);
            const drawIndex = players.reduce((sum, row) => sum + row.drawIndex, 0);
            const sameQuartet = currentKey && quartetKey(players.map((row) => row.id)) === currentKey ? 1 : 0;
            return {
              players,
              score:
                (games.reduce((sum, value) => sum + value, 0) * 1000) +
                ((Math.max(...games) - Math.min(...games)) * 240) +
                (sameQuartet * 120) +
                (lastRounds * 4) +
                (points * 0.1) +
                (drawIndex * 0.01)
            };
          })
          .sort((a, b) => a.score - b.score)[0].players;
      }

      function combinations(items, size) {
        const result = [];
        const walk = (start, picked) => {
          if (picked.length === size) {
            result.push(picked);
            return;
          }
          for (let i = start; i <= items.length - (size - picked.length); i += 1) {
            walk(i + 1, [...picked, items[i]]);
          }
        };
        walk(0, []);
        return result;
      }

      function getGroupStandings(group) {
        const ids = state.groups[group] || [];
        const rows = ids.map((id) => ({
          id,
          wins: 0,
          losses: 0,
          played: 0,
          for: 0,
          against: 0,
          diff: 0,
          drawIndex: getPlayer(id).drawIndex
        }));
        const byId = Object.fromEntries(rows.map((row) => [row.id, row]));
        state.tennisMatches
          .filter((m) => m.phase === "group" && m.group === group && m.result)
          .forEach((match) => {
            const [p1, p2] = resolveMatchPlayers(match).map((team) => team[0]);
            const a = byId[p1];
            const b = byId[p2];
            const r = match.result;
            a.played += 1;
            b.played += 1;
            a.for += r.score1;
            a.against += r.score2;
            b.for += r.score2;
            b.against += r.score1;
            if (r.isDraw || !Number.isInteger(r.winnerSide)) {
              return;
            }
            if (r.winnerSide === 0) {
              a.wins += 1;
              b.losses += 1;
            } else {
              b.wins += 1;
              a.losses += 1;
            }
          });
        rows.forEach((row) => {
          row.diff = row.for - row.against;
        });
        return rows.sort((a, b) => {
          const base = b.wins - a.wins || b.diff - a.diff;
          if (base !== 0) return base;
          const h2h = headToHeadWinner(group, a.id, b.id);
          if (h2h === a.id) return -1;
          if (h2h === b.id) return 1;
          return b.for - a.for || a.drawIndex - b.drawIndex;
        });
      }

      function headToHeadWinner(group, aId, bId) {
        const match = state.tennisMatches.find((m) => {
          if (m.phase !== "group" || m.group !== group || !m.result) return false;
          const players = resolveMatchPlayers(m).map((team) => team[0]);
          return players.includes(aId) && players.includes(bId);
        });
        if (!match) return null;
        if (match.result.isDraw || !Number.isInteger(match.result.winnerSide)) return null;
        const players = resolveMatchPlayers(match).map((team) => team[0]);
        return players[match.result.winnerSide];
      }

      function getPadelStats() {
        const hasResults = state.padelMatches.some((match) => match.result);
        return getPadelStatsForSelection()
          .sort((a, b) => b.points - a.points || b.games - a.games || a.drawIndex - b.drawIndex)
          .map((row, index) => ({
            ...row,
            placementPoints: hasResults ? PLACEMENT_POINTS[index + 1] || 0 : 0
          }));
      }

      function getPadelStatsForSelection() {
        const rows = state.players.map((player) => ({
          id: player.id,
          points: 0,
          games: 0,
          lastRound: -999,
          drawIndex: player.drawIndex
        }));
        const byId = Object.fromEntries(rows.map((row) => [row.id, row]));
        state.padelMatches.filter((m) => m.result).forEach((match) => {
          const teams = resolveMatchPlayers(match);
          teams[0].forEach((id) => {
            byId[id].points += match.result.score1;
            byId[id].games += 1;
            byId[id].lastRound = match.round;
          });
          teams[1].forEach((id) => {
            byId[id].points += match.result.score2;
            byId[id].games += 1;
            byId[id].lastRound = match.round;
          });
        });
        return rows;
      }

      function getPadelPartnerHistory() {
        const history = new Map();
        state.padelMatches.filter((m) => m.result).forEach((match) => {
          resolveMatchPlayers(match).forEach((team) => {
            const key = pairKey(team);
            history.set(key, (history.get(key) || 0) + 1);
          });
        });
        return history;
      }

      function getPadelOpponentHistory() {
        const history = new Map();
        state.padelMatches.filter((m) => m.result).forEach((match) => {
          const teams = resolveMatchPlayers(match);
          teams[0].forEach((left) => {
            teams[1].forEach((right) => {
              const key = pairKey([left, right]);
              history.set(key, (history.get(key) || 0) + 1);
            });
          });
        });
        return history;
      }

      function pairingRepeatScore(pairs, partnerHistory, opponentHistory, currentMatch) {
        const partnerRepeats = pairs.reduce((sum, pair) => sum + (partnerHistory.get(pairKey(pair)) || 0), 0);
        const opponentRepeats = pairs[0].reduce((sum, left) => (
          sum + pairs[1].reduce((inner, right) => inner + (opponentHistory.get(pairKey([left, right])) || 0), 0)
        ), 0);
        const samePairing = currentMatch && samePadelPairing(pairs, resolveMatchPlayers(currentMatch)) ? 1 : 0;
        return (partnerRepeats * 12) + (opponentRepeats * 3) + (samePairing * 80);
      }

      function samePadelPairing(left, right) {
        const leftPairs = left.map(pairKey).sort().join("|");
        const rightPairs = right.map(pairKey).sort().join("|");
        return leftPairs === rightPairs;
      }

      function pairKey(pair) {
        return [...pair].sort().join("+");
      }

      function quartetKey(ids) {
        return [...ids].sort().join("+");
      }

      function getOverallLeaderboard() {
        const tennis = getTennisPointsByPlayer();
        const padel = getPadelPointsByPlayer();
        return state.players.map((player) => ({
          id: player.id,
          name: player.name,
          tennis: tennis[player.id] || 0,
          padel: padel[player.id] || 0,
          total: (tennis[player.id] || 0) + (padel[player.id] || 0),
          drawIndex: player.drawIndex
        })).sort((a, b) => b.total - a.total || b.padel - a.padel || b.tennis - a.tennis || a.name.localeCompare(b.name, "sk"));
      }

      function getPadelPointsByPlayer() {
        return Object.fromEntries(getPadelStats().map((row) => [row.id, row.placementPoints]));
      }

      function getTennisPointsByPlayer() {
        const points = {};
        getTennisPlacements().forEach((row) => {
          points[row.id] = TENNIS_POINTS[row.place];
        });
        return points;
      }

      function getTennisPlacements() {
        const final1 = getMatch("final1");
        const third = getMatch("third");
        const fifth = getMatch("fifth");
        const seventh = getMatch("seventh");
        if (![final1, third, fifth, seventh].every((m) => m && m.result)) return [];
        return [
          { place: 1, id: getOutcome(final1, "winner") },
          { place: 2, id: getOutcome(final1, "loser") },
          { place: 3, id: getOutcome(third, "winner") },
          { place: 4, id: getOutcome(third, "loser") },
          { place: 5, id: getOutcome(fifth, "winner") },
          { place: 6, id: getOutcome(fifth, "loser") },
          { place: 7, id: getOutcome(seventh, "winner") },
          { place: 8, id: getOutcome(seventh, "loser") }
        ];
      }

      function allGroupMatchesComplete() {
        const matches = state.tennisMatches.filter((m) => m.phase === "group");
        return matches.length === 12 && matches.every((m) => m.result);
      }

      function allPlayoffComplete() {
        const matches = state.tennisMatches.filter((m) => m.phase === "playoff");
        return matches.length === 8 && matches.every((m) => m.result);
      }

      function canResolveMatch(match) {
        return resolveMatchPlayers(match).every((team) => team && team.length > 0);
      }

      function resolveMatchPlayers(match) {
        return [resolveSide(match.side1), resolveSide(match.side2)];
      }

      function resolveSide(side) {
        if (side.players) return side.players;
        if (!side.ref) return null;
        const source = getMatch(side.ref.matchId);
        if (!source || !source.result) return null;
        return [getOutcome(source, side.ref.outcome)];
      }

      function getOutcome(match, outcome) {
        const teams = resolveMatchPlayers(match);
        const winner = teams[match.result.winnerSide][0];
        const loser = teams[match.result.winnerSide === 0 ? 1 : 0][0];
        return outcome === "winner" ? winner : loser;
      }

      function getMatch(id) {
        return [...state.tennisMatches, ...state.padelMatches].find((m) => m.id === id);
      }

      function getPlayer(id) {
        return state.players.find((p) => p.id === id) || { id, name: "Neznámy hráč", drawIndex: 999 };
      }

      function teamName(team) {
        if (!team) return "Čaká sa na súpera";
        return team.map((id) => getPlayer(id).name).join(" + ");
      }

      function formatResult(match) {
        if (!match.result) return null;
        if (match.format === "set4") {
          const tb1 = Number.isInteger(match.result.tb1) ? ` (${match.result.tb1})` : "";
          const tb2 = Number.isInteger(match.result.tb2) ? ` (${match.result.tb2})` : "";
          return { left: `${match.result.games1}${tb1}`, right: `${match.result.games2}${tb2}` };
        }
        return { left: match.result.score1, right: match.result.score2 };
      }

      function resultBadge(match) {
        if (isDeferredMatch(match)) return "odložené";
        if (!match.result) return canResolveMatch(match) ? "zadať" : "čaká";
        if (match.result.mode === "forfeit") return "kontumácia";
        if (match.result.mode === "draw" || match.result.isDraw) return "remíza";
        return "hotovo";
      }

      function shuffle(items) {
        const copy = [...items];
        for (let i = copy.length - 1; i > 0; i -= 1) {
          const j = Math.floor(Math.random() * (i + 1));
          [copy[i], copy[j]] = [copy[j], copy[i]];
        }
        return copy;
      }

      async function runDrawAnimation(title, finalItems, pool = null) {
        const items = finalItems.map((item) => typeof item === "string" ? { label: "Los", value: item } : item);
        const drawPool = pool?.length ? pool : items.flatMap((item) => String(item.value).split(/\s*,\s*/)).filter(Boolean);
        drawTitle.textContent = title;
        drawOverlay.classList.add("open");
        drawOverlay.setAttribute("aria-hidden", "false");
        for (let tick = 0; tick < 10; tick += 1) {
          drawList.innerHTML = items.map((item) => `
            <div class="draw-item">
              <span>${escapeHtml(item.label)}</span>
              <strong>${escapeHtml(shuffle(drawPool).slice(0, Math.min(4, drawPool.length)).join(" + "))}</strong>
            </div>
          `).join("");
          await sleep(55 + (tick * 14));
        }
        drawList.innerHTML = items.map((item) => `
          <div class="draw-item">
            <span>${escapeHtml(item.label)}</span>
            <strong>${escapeHtml(item.value)}</strong>
          </div>
        `).join("");
        await sleep(620);
        drawOverlay.classList.remove("open");
        drawOverlay.setAttribute("aria-hidden", "true");
      }

      function formatPadelDrawItems(match) {
        return [
          { label: "Dvojica 1", value: teamName(match.side1.players) },
          { label: "Dvojica 2", value: teamName(match.side2.players) }
        ];
      }

      function sleep(ms) {
        return new Promise((resolve) => window.setTimeout(resolve, ms));
      }

      function signed(number) {
        return number > 0 ? `+${number}` : String(number);
      }

      function toInt(value) {
        if (value === null || value === "") return NaN;
        const number = Number(value);
        return Number.isInteger(number) ? number : NaN;
      }

      async function confirmRemoteFreshness() {
        if (!REMOTE_ENABLED || !tournamentId) return true;
        try {
          const response = await fetch(`${supabaseRestUrl()}?id=eq.${encodeURIComponent(tournamentId)}&select=id,updated_at`, {
            headers: supabaseHeaders()
          });
          if (!response.ok) throw new Error(`Supabase conflict check failed: ${response.status}`);
          const rows = await response.json();
          const remoteUpdatedAt = rows[0]?.updated_at;
          if (!remoteUpdatedAt) return true;
          const remoteTime = Date.parse(remoteUpdatedAt);
          const localTime = Date.parse(state.updatedAt || 0);
          if (remoteTime <= localTime) return true;
          const overwrite = window.confirm("Online verzia turnaja je novšia než táto obrazovka. OK = prepísať online touto zmenou, Zrušiť = načítať online stav a nepokračovať.");
          if (overwrite) return true;
          await loadRemoteState();
          return false;
        } catch (error) {
          console.error(error);
          return window.confirm("Nepodarilo sa overiť online stav. Pokračovať iba s lokálnou zmenou?");
        }
      }

      function downloadBackup() {
        const payload = JSON.stringify(state, null, 2);
        const blob = new Blob([payload], { type: "application/json" });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = `${tournamentId || "turnaj"}-backup-${new Date().toISOString().slice(0, 10)}.json`;
        document.body.appendChild(link);
        link.click();
        link.remove();
        URL.revokeObjectURL(link.href);
      }

      function importBackup() {
        const input = document.createElement("input");
        input.type = "file";
        input.accept = "application/json,.json";
        input.style.display = "none";
        input.addEventListener("change", async () => {
          const file = input.files?.[0];
          if (!file) {
            input.remove();
            return;
          }
          try {
            const text = await file.text();
            const parsed = JSON.parse(text);
            const imported = normalizeState(parsed.state || parsed);
            const importedId = imported.tournamentId || "neznámy";
            const updated = imported.updatedAt || "neznámy";
            const confirmText = `Importovať zálohu do aktuálneho turnaja "${tournamentId}"?\n\nZáloha: ${importedId}\nPosledná zmena: ${updated}\n\nAktuálne dáta budú prepísané.`;
            if (!window.confirm(confirmText)) return;
            if (!(await confirmRemoteFreshness())) return;
            const before = snapshotCoreState();
            state = normalizeState({
              ...imported,
              tournamentId
            });
            recordAudit(before, "Import zálohy", {
              oldValue: { updatedAt: before.updatedAt },
              newValue: { importedTournamentId: importedId, updatedAt: imported.updatedAt }
            });
            saveState();
            activeTab = state.setupDone ? "groups" : "setup";
            render();
          } catch (error) {
            console.error(error);
            window.alert("Zálohu sa nepodarilo importovať. Skontroluj, že ide o JSON export z tejto appky.");
          } finally {
            input.remove();
          }
        });
        document.body.appendChild(input);
        input.click();
      }

      async function copyText(text, successMessage = "Text je skopírovaný.") {
        try {
          await navigator.clipboard.writeText(text);
          window.alert(successMessage);
        } catch {
          window.prompt("Skopíruj text:", text);
        }
      }

      function escapeHtml(value) {
        return String(value)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#039;");
      }

      render();
      loadRemoteState();
    })();
  </script>
